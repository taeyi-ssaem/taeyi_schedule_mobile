<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>태이쌤 일정비서</title>
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="일정비서">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{--bg:#f4f6fb;--card:#fff;--ink:#1e293b;--sub:#64748b;--line:#e2e8f0;--danger:#dc2626;--warn:#d97706;--accent:#2563eb;--shadow:0 1px 3px rgba(15,23,42,.08),0 6px 18px rgba(15,23,42,.05)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding:14px 12px 40px;max-width:560px;margin:0 auto}
  .top{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .logo{font-size:20px;font-weight:800}.logo span{color:var(--accent)}
  .ro{font-size:11px;color:var(--sub);background:#eef2ff;color:#3730a3;border:1px solid #dbe3ff;padding:3px 8px;border-radius:999px;margin-left:auto}
  .dday{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .dday b{background:var(--accent);color:#fff;border-radius:8px;padding:4px 10px;font-size:14px;font-weight:800}
  .dday .t{font-weight:700;font-size:14px}.dday .d{font-size:12px;color:var(--sub)}
  .toggle{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:14px}
  .toggle button{flex:1;border:0;background:none;padding:10px;font-size:14px;font-weight:700;color:var(--sub)}
  .toggle button.on{background:var(--accent);color:#fff}
  h2.sec{font-size:13.5px;font-weight:700;margin:16px 2px 9px;display:flex;align-items:center;gap:7px}
  h2.sec .badge{font-size:11px;color:#fff;background:var(--sub);border-radius:999px;padding:1px 8px}
  h2.sec.danger .badge{background:var(--danger)}
  .item{background:var(--card);border:1px solid var(--line);border-left-width:5px;border-radius:12px;padding:11px 13px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
  .item .body{flex:1;min-width:0}
  .item .ti{font-weight:700;font-size:14.5px}
  .item .me{font-size:12px;color:var(--sub);margin-top:2px}
  .item .mo{font-size:12px;color:#475569;background:#f8fafc;border-radius:7px;padding:4px 8px;margin-top:5px}
  .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .tag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;background:#f1f5f9;color:#475569}
  .tag.cat{color:#fff}.tag.rem{background:#fef3c7;color:#92400e}.tag.rec{background:#eef2ff;color:#4338ca}
  .dd{flex:0 0 auto;text-align:right;font-weight:800;font-size:13px;min-width:52px}
  .dd small{display:block;font-weight:600;font-size:10px;color:var(--sub)}
  .dd.over{color:var(--danger)}.dd.today{color:var(--danger)}.dd.soon{color:var(--warn)}
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:20px;background:var(--card);border:1px dashed var(--line);border-radius:12px}
  /* calendar */
  #cal{display:none}
  .calhead{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
  .calhead button{border:1px solid var(--line);background:var(--card);border-radius:9px;width:36px;height:36px;font-size:18px}
  .calhead .mt{font-size:16px;font-weight:800}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .dow{text-align:center;font-size:11px;font-weight:700;color:var(--sub)}
  .dow.s{color:#dc2626}.dow.t{color:#2563eb}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:8px;min-height:62px;padding:3px;font-size:9.5px;overflow:hidden}
  .cell.o{opacity:.45}.cell.now{border-color:var(--accent);border-width:2px}
  .cell .dn{font-weight:700;font-size:11px}.cell.now .dn{color:var(--accent)}
  .ev{color:#fff;border-radius:4px;padding:1px 3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  footer{text-align:center;font-size:11px;color:var(--sub);margin-top:22px;line-height:1.6}
</style>
</head>
<body>
  <div class="top">
    <div class="logo">📌 <span>일정비서</span></div>
    <div class="ro">👀 보기 전용</div>
  </div>
  <div class="dday" id="dday"></div>
  <div class="toggle"><button id="b-list" class="on">📋 일정</button><button id="b-cal">🗓 달력</button></div>
  <div id="list"></div>
  <div id="cal">
    <div class="calhead"><button id="prev">‹</button><div class="mt" id="mt"></div><button id="next">›</button></div>
    <div class="grid" id="grid"></div>
  </div>
  <footer id="foot">보기 전용 화면입니다 · 추가·수정은 PC 일정비서에서 하세요</footer>

<script src="일정_data.js"></script>
<script>
const D=window.SCHEDULE_DATA||{categories:{},items:[],recurring:[]};
const CATS=D.categories||{};
const today=new Date();today.setHours(0,0,0,0);
const pad=n=>String(n).padStart(2,"0");
const parse=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
const diff=s=>Math.round((parse(s)-today)/86400000);
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const col=c=>(CATS[c]&&CATS[c].color)||"#64748b";
const emo=c=>(CATS[c]&&CATS[c].emoji)||"•";
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
function occ(){const out=[],end=addD(today,45);(D.recurring||[]).forEach(r=>{if(r.active===false)return;for(let d=new Date(today);d<=end;d=addD(d,1)){const hit=(r.freq==='weekly'&&(r.byday||[]).includes(d.getDay()))||(r.freq==='monthly'&&d.getDate()===(r.monthday||1));if(hit){const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;out.push({id:`rec:${r.id}:${ds}`,title:r.title,date:ds,time:r.time||'',category:r.category,type:'task',memo:r.memo||'',reminders:[],_recur:true});}}});return out;}
function items(){return [...(D.items||[]),...occ()];}

function ddc(s){const n=diff(s);if(n<0)return{t:`D+${-n}`,s:"지남",c:"over"};if(n===0)return{t:"D-DAY",s:"오늘",c:"today"};if(n<=3)return{t:`D-${n}`,s:`${n}일 뒤`,c:"soon"};return{t:`D-${n}`,s:`${n}일 뒤`,c:""};}
function itemHTML(it){
  const dd=ddc(it.date);
  const t=it.time?(it.endTime?`${it.time}–${it.endTime}`:it.time):(it.type==="task"?"마감":"종일");
  const rems=(it.reminders||[]).map(r=>`<span class="tag rem">⏰ ${r}</span>`).join("");
  const rg=it.registered||{};const regs=[rg.calendar&&"캘린더",rg.notion&&"노션"].filter(Boolean).map(x=>`<span class="tag">✓ ${x}</span>`).join("");
  return `<div class="item" style="border-left-color:${col(it.category)}"><div class="body">
    <div class="ti">${esc(it.title)}${it._recur?' <span class="tag rec">🔁</span>':''}</div>
    <div class="me">📆 ${it.date} · ${t}${it.location?' · 📍'+esc(it.location):''}</div>
    ${it.memo?`<div class="mo">${esc(it.memo)}</div>`:''}
    <div class="tags"><span class="tag cat" style="background:${col(it.category)}">${emo(it.category)} ${it.category}</span>${rems}${regs}</div>
  </div><div class="dd ${dd.c}">${dd.t}<small>${dd.s}</small></div></div>`;
}
function renderList(){
  const all=items().sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(a.time||"").localeCompare(b.time||""));
  const g={over:[],today:[],week:[],later:[]};
  all.forEach(it=>{const n=diff(it.date);if(n<0)g.over.push(it);else if(n===0)g.today.push(it);else if(n<=7)g.week.push(it);else g.later.push(it);});
  const sec=(title,arr,cls)=>arr.length?`<h2 class="sec ${cls||''}">${title} <span class="badge">${arr.length}</span></h2>`+arr.map(itemHTML).join(""):"";
  let h=sec("⚠️ 지난 (미완료)",g.over,"danger")+sec("🔴 오늘",g.today)+sec("📅 다가오는 일정",g.week)+sec("🗓 그 이후",g.later);
  document.getElementById("list").innerHTML=h||`<div class="empty">예정된 일정이 없어요 🎉</div>`;
}
function renderDday(){
  const up=items().filter(it=>diff(it.date)>=0).sort((a,b)=>a.date<b.date?-1:1);
  const box=document.getElementById("dday");
  if(!up.length){box.innerHTML='<span class="d">예정된 일정이 없어요</span>';return;}
  const it=up[0],n=diff(it.date);
  box.innerHTML=`<b>${n===0?"D-DAY":"D-"+n}</b><div><div class="t">${esc(it.title)}</div><div class="d">${it.date}${it.time?' '+it.time:''}</div></div>`;
}
let cy=today.getFullYear(),cm=today.getMonth();
function renderCal(){
  document.getElementById("mt").textContent=`${cy}년 ${cm+1}월`;
  const grid=document.getElementById("grid");grid.innerHTML="";
  ["일","월","화","수","목","금","토"].forEach((d,i)=>{const e=document.createElement("div");e.className="dow"+(i===0?" s":i===6?" t":"");e.textContent=d;grid.appendChild(e);});
  const start=new Date(cy,cm,1).getDay(),din=new Date(cy,cm+1,0).getDate(),pd=new Date(cy,cm,0).getDate();
  const by={};items().forEach(it=>{(by[it.date]=by[it.date]||[]).push(it);});
  const cells=[];for(let i=start-1;i>=0;i--)cells.push({d:pd-i,o:1,y:cm===0?cy-1:cy,m:cm===0?11:cm-1});
  for(let d=1;d<=din;d++)cells.push({d,o:0,y:cy,m:cm});
  let nd=1;while(cells.length<42)cells.push({d:nd++,o:1,y:cm===11?cy+1:cy,m:cm===11?0:cm+1});
  const ts=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  cells.slice(0,42).forEach(c=>{const ds=`${c.y}-${pad(c.m+1)}-${pad(c.d)}`,cell=document.createElement("div");
    cell.className="cell"+(c.o?" o":"")+(ds===ts?" now":"");let html=`<div class="dn">${c.d}</div>`;
    (by[ds]||[]).slice(0,3).forEach(it=>{html+=`<div class="ev" style="background:${col(it.category)}">${esc(it.title)}</div>`;});
    const ex=(by[ds]||[]).length-3;if(ex>0)html+=`<div style="font-size:9px;color:#64748b">+${ex}</div>`;
    cell.innerHTML=html;grid.appendChild(cell);});
}
document.getElementById("prev").onclick=()=>{cm--;if(cm<0){cm=11;cy--}renderCal();};
document.getElementById("next").onclick=()=>{cm++;if(cm>11){cm=0;cy++}renderCal();};
document.getElementById("b-list").onclick=()=>{document.getElementById("b-list").classList.add("on");document.getElementById("b-cal").classList.remove("on");document.getElementById("list").style.display="block";document.getElementById("cal").style.display="none";};
document.getElementById("b-cal").onclick=()=>{document.getElementById("b-cal").classList.add("on");document.getElementById("b-list").classList.remove("on");document.getElementById("list").style.display="none";document.getElementById("cal").style.display="block";renderCal();};

document.getElementById("foot").innerHTML+=`<br>업데이트 ${D.updated||"—"}`;
renderDday();renderList();
if("serviceWorker" in navigator && location.protocol.startsWith("http")) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
